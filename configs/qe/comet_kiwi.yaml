# Reference-free quality estimation for the collapse signal dQE(s).
# Primary: MetricX-24 hybrid XXL (bfloat16).
# MetricX predicts error scores in [0,25] (lower=better); qe.py converts this to
# quality scores (higher=better) so delta_qe logic stays unchanged.
primary:
  backend: "metricx24"
  model_name: "google/metricx-24-hybrid-xxl-v2p6-bfloat16"
  tokenizer_name: "google/mt5-xl"
  max_input_length: 1536
  fallback_model_name: null
  batch_size: 8
  gpus: 1

# Optional reference-based metrics used for analysis only (test.csv has gold Target_Ko).
# These are not part of the Stage A loop in the production algorithm.
reference_based:
  comet_ref:
    enabled: true
    model_name: "Unbabel/wmt22-comet-da"
  chrf:
    enabled: true
    word_order: 2
