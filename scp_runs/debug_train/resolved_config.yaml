run_id: debug_train
seed: 42
storage:
  workdir: ./scp_runs/debug_train
  cloud_uri: null
  write_jsonl_events: true
  write_parquet_tables: true
  sync_every_round: false
logging:
  wandb_enabled: false
  wandb_project: scp-stage4
  weave_enabled: false
  weave_project: scp-stage4
  weave_trace_teacher_only: true
recovery:
  skip_existing_teacher_calls: true
  skip_existing_generations: true
  atomic_writes: true
models:
  student:
    model_id: stub
    decoding:
      temperature: 0.2
      do_sample: true
      top_p: 0.9
      top_k: null
      max_new_tokens: 128
      repetition_penalty: null
      seed: 42
  probe:
    base_model_id: stub
    lora_id: null
    decoding:
      temperature: 0.0
      do_sample: false
      top_p: 1.0
      top_k: null
      max_new_tokens: 128
      repetition_penalty: null
      seed: null
  teacher:
    provider: echo
    model: echo-test
    prompt_version: teacher_edit_v1
    prompt_path: prompts/teacher_edit_v1.txt
    system_prompt: You are a careful, terse translation editor.
    temperature: 0.0
    max_tokens: 256
    timeout_s: 30
    max_retries: 1
round_overrides: {}
extras:
  budget:
    per_round_calls: 100
    per_round_usd: 10.0
  collapse:
    qe_drop_threshold: 0.05
    weight_delta_qe: 1.0
    weight_rule_worsened: 0.5
  dev_eval:
    dev_set_path: data/dev_smoke.jsonl
    enabled: true
    metrics:
    - type: length_ratio
    - type: chrf
      word_order: 2
  schedule:
  - student_gen
  - pre_score
  - probe_train
  - probe_gen
  - collapse_select
  - teacher
  - build_sft
  - build_pref
  - dev_eval
  - summarize
  scoring:
    qe:
      type: heuristic
    scorers:
    - max_ratio: 3.0
      min_ratio: 0.3
      type: length_ratio
    - type: number_match
    - rules:
      - flag_if: absent
        name: missing_period
        'on': hypothesis
        pattern: '[.!?]$'
      type: rule_flags
  selector:
    max_per_round: 100
    min_selection_score: 0.0
    require_collapse_flag: false
  training_schedule:
    1:
    - sft_train
    - pref_train
